services:
  - type: web
    name: research-backend
    env: node
    plan: free # Change to a paid plan if needed
    rootDir: research_backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Make sure to set these securely in the Render dashboard later:
      # - key: DATABASE_URL
      # - key: OPENAI_API_KEY
      # - key: ANTHROPIC_API_KEY
      # - key: GEMINI_API_KEY
